name: Publishes llpsdk package to npmjs
on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish-release:
    runs-on: ubuntu-latest
    environment:
      name: npmjs

    steps:
      - uses: actions/checkout@v6

      - name: Setup Nodejs
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Build package
        run: npm ci

      - name: Publish package
        run: npm publish
